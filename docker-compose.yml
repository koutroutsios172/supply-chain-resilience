services:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8000
    image: supply-chain-frontend:latest
    container_name: scr-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - scr-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Backend (placeholder — replace with your actual service) ──────────────
  backend:
    build: ./backend
    container_name: scr-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/chroma_db:/app/chroma_db
    env_file:
      - ./backend/.env
    restart: always
    networks:
      - scr-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 65s

networks:
  scr-network:
    driver: bridge
    name: supply-chain-resilience

volumes:
  node_modules:
